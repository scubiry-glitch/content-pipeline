# =============================================================================
# 宝塔面板用法（仓库无法代你改服务器上的配置，请手工粘贴）
#
# 1. 宝塔 → 网站 → paper.morning.rocks → 设置 → 配置文件
# 2. 在 server { ... } 内加入下面「---- 开始粘贴 ----」到「---- 结束 ----」之间的内容
# 3. 若 API 不在本机 3000（例如 Docker 映射为 3001），只改 proxy_pass 里的端口
# 4. 前端须用相对地址构建：VITE_API_URL=/api/v1（勿写 localhost，避免浏览器拦截）
# 5. 保存后：nginx -t 或在宝塔里「重载配置」
# =============================================================================

# ---- 开始粘贴 ----

    # 同域 API 反代：浏览器请求 https://paper.morning.rocks/api/v1/... → 本机 Node API
    # 勿在 proxy_pass 末尾加 /，否则路径会与 Fastify 的 /api/v1 前缀不一致
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
    }

# ---- 结束 ----
