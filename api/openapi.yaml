openapi: 3.0.0
info:
  title: 内容生产流水线 API
  description: |
    内容生产流水线 - MVP版本
    支持：选题 → 研究 → 写作 → BlueTeam评审 → 发布
  version: 1.0.0
  contact:
    name: 内容生产团队

servers:
  - url: http://localhost:3000/api/v1
    description: 本地开发环境

security:
  - ApiKeyAuth: []

paths:
  /health:
    get:
      summary: 健康检查
      security: []
      responses:
        '200':
          description: 服务正常运行
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time

  /production:
    post:
      summary: 创建内容生产任务
      description: 启动选题→研究→写作→BlueTeam评审的完整流程
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - topic
              properties:
                topic:
                  type: string
                  description: 选题主题
                  example: "REITs替代土地财政的可行性分析"
                source_materials:
                  type: array
                  items:
                    type: string
                  description: 参考素材ID列表
                  example: ["asset_001", "asset_002"]
                target_formats:
                  type: array
                  items:
                    type: string
                    enum: [markdown, html]
                  default: [markdown]
      responses:
        '201':
          description: 任务创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'

    get:
      summary: 获取任务列表
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, researching, writing, reviewing, awaiting_approval, completed, failed]
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: 任务列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Task'

  /production/{taskId}:
    get:
      summary: 获取任务详情
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 任务详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskDetail'

  /production/{taskId}/approve:
    post:
      summary: 人工确认发布
      description: BlueTeam评审完成后，人工确认是否通过
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - approved
              properties:
                approved:
                  type: boolean
                  description: 是否通过
                feedback:
                  type: string
                  description: 反馈意见（拒绝时填写）
      responses:
        '200':
          description: 确认成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'

  /assets:
    post:
      summary: 上传素材
      description: 上传研报/文档到素材库，自动提取标签和向量
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: 支持pdf、txt、md格式
                title:
                  type: string
                  description: 素材标题
                source:
                  type: string
                  description: 来源
                tags:
                  type: array
                  items:
                    type: string
                  description: 手动标签（可选）
      responses:
        '201':
          description: 上传成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Asset'

    get:
      summary: 搜索素材
      description: 支持语义搜索和标签过滤
      parameters:
        - name: q
          in: query
          description: 搜索关键词（语义搜索）
          schema:
            type: string
        - name: tags
          in: query
          description: 标签过滤（逗号分隔）
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: 搜索结果
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Asset'

  /assets/{assetId}:
    get:
      summary: 获取素材详情
      parameters:
        - name: assetId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 素材详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Asset'

    delete:
      summary: 删除素材
      parameters:
        - name: assetId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: 删除成功

  /outputs/{outputId}:
    get:
      summary: 获取产出物内容
      description: 获取生成的Markdown/HTML内容
      parameters:
        - name: outputId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 产出物内容
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Output'

  /outputs/{outputId}/download:
    get:
      summary: 下载产出物
      description: 直接下载Markdown文件
      parameters:
        - name: outputId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 文件内容
          content:
            text/markdown:
              schema:
                type: string

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

  schemas:
    Task:
      type: object
      properties:
        id:
          type: string
          example: "task_abc123"
        status:
          type: string
          enum: [pending, researching, writing, reviewing, awaiting_approval, completed, failed]
          example: "reviewing"
        topic:
          type: string
          example: "REITs替代土地财政的可行性分析"
        progress:
          type: integer
          description: 进度百分比
          example: 75
        current_stage:
          type: string
          example: "blue_team_round_1"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
          nullable: true

    TaskDetail:
      allOf:
        - $ref: '#/components/schemas/Task'
        - type: object
          properties:
            outline:
              type: object
              nullable: true
              properties:
                title:
                  type: string
                sections:
                  type: array
                  items:
                    type: object
            research_data:
              type: array
              items:
                type: object
                properties:
                  asset_id:
                    type: string
                  relevance_score:
                    type: number
            blue_team_reviews:
              type: array
              description: BlueTeam评审记录
              items:
                type: object
                properties:
                  round:
                    type: integer
                    enum: [1, 2]
                  expert_role:
                    type: string
                    enum: [challenger, expander, synthesizer]
                  questions:
                    type: array
                    items:
                      type: object
                      properties:
                        angle:
                          type: string
                        content:
                          type: string
                        severity:
                          type: string
                          enum: [high, medium, low]
            draft_versions:
              type: array
              items:
                type: object
                properties:
                  version:
                    type: integer
                  content:
                    type: string
            output_ids:
              type: array
              items:
                type: string

    Asset:
      type: object
      properties:
        id:
          type: string
          example: "asset_xyz789"
        title:
          type: string
        content_type:
          type: string
          enum: [pdf, txt, md, url]
        content_preview:
          type: string
          description: 内容前500字
        tags:
          type: array
          items:
            type: string
        source:
          type: string
        quality_score:
          type: number
          description: 质量评分0-1
        created_at:
          type: string
          format: date-time

    Output:
      type: object
      properties:
        id:
          type: string
        task_id:
          type: string
        format:
          type: string
          enum: [markdown, html]
        content:
          type: string
          description: 完整内容
        download_url:
          type: string
        created_at:
          type: string
          format: date-time

    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        code:
          type: string
