openapi: 3.0.0
info:
  title: 内容生产流水线 API
  version: 2.0.0
  description: |
    内容生产流水线后端 API 规格

    技术栈: TypeScript + Node.js + Fastify

    代码位置: `/Users/行业研究/demo-project/content-pipeline/`

servers:
  - url: http://localhost:3000/api/v2
    description: 本地开发环境

paths:
  /health:
    get:
      summary: 健康检查
      description: 检查服务及各依赖组件健康状态
      responses:
        '200':
          description: 服务正常
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: 服务异常
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /topics:
    get:
      summary: 获取选题列表
      description: 获取推荐的选题列表，基于热点、用户反馈和历史复用
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: source
          in: query
          schema:
            type: string
            enum: [hot, feedback, history, all]
            default: all
      responses:
        '200':
          description: 选题列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  topics:
                    type: array
                    items:
                      $ref: '#/components/schemas/Topic'

    post:
      summary: 创建新选题
      description: 手动创建一个新的内容选题
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TopicInput'
      responses:
        '201':
          description: 选题创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Topic'

  /topics/{topicId}/research:
    post:
      summary: 执行研究
      description: 对指定选题执行自动化研究，检索相关研报和数据
      parameters:
        - name: topicId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 研究结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResearchResult'

  /topics/{topicId}/outline:
    post:
      summary: 生成大纲
      description: 基于研究结果自动生成内容大纲
      parameters:
        - name: topicId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 大纲生成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Outline'

  /topics/{topicId}/content:
    post:
      summary: 生成内容
      description: 基于大纲自动生成内容初稿
      parameters:
        - name: topicId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                model:
                  type: string
                  enum: [claude-sonnet-4-6, claude-opus-4-6]
                  default: claude-sonnet-4-6
      responses:
        '200':
          description: 内容生成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Content'

  /content/{contentId}/review:
    post:
      summary: 提交蓝军评审
      description: 提交内容进行蓝军（专家+AI）评审
      parameters:
        - name: contentId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 评审结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewResult'

  /content/{contentId}/publish:
    post:
      summary: 发布内容
      description: 将评审通过的内容发布到各平台
      parameters:
        - name: contentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                platforms:
                  type: array
                  items:
                    type: string
                    enum: [wechat, zhihu, xueqiu]
      responses:
        '200':
          description: 发布成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublishResult'

  /reports:
    get:
      summary: 研报检索
      description: RAG检索242份历史研报
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
        - name: top_k
          in: query
          schema:
            type: integer
            default: 5
      responses:
        '200':
          description: 检索结果
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/Report'

  # ─────────── v7.6 会议纪要采集渠道 ─────────────────────────────
  /quality/meeting-note-sources:
    get:
      summary: 列出采集源
      parameters:
        - name: kind
          in: query
          schema: { $ref: '#/components/schemas/MeetingNoteSourceKind' }
        - name: active
          in: query
          schema: { type: boolean }
      responses:
        '200':
          description: 采集源列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/MeetingNoteSource' }
    post:
      summary: 创建采集源
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MeetingNoteSourceCreate' }
      responses:
        '201':
          description: 已创建
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MeetingNoteSource' }
        '400': { description: kind 不支持或字段非法 }

  /quality/meeting-note-sources/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    put:
      summary: 更新采集源
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MeetingNoteSourceUpdate' }
      responses:
        '200':
          description: 更新后的对象
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MeetingNoteSource' }
        '404': { description: 不存在 }
    delete:
      summary: 删除采集源（级联删除 imports）
      responses:
        '200':
          description: 已删除
          content:
            application/json:
              schema:
                type: object
                properties: { success: { type: boolean } }
        '404': { description: 不存在 }

  /quality/meeting-note-sources/import:
    post:
      summary: 触发采集
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id: { type: string, format: uuid }
                triggeredBy:
                  type: string
                  description: 默认 'manual'，定时任务写 'scheduled'，上传走 'upload'
      responses:
        '200':
          description: 作业结果（同步返回）
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MeetingNoteImport' }
        '404': { description: source 不存在 }

  /quality/meeting-note-sources/{id}/upload:
    post:
      summary: 单文件上传（multipart）— upload / manual 类型快捷通道
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file: { type: string, format: binary }
      responses:
        '200':
          description: 作业结果
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MeetingNoteImport' }
        '404': { description: source 不存在 }
        '415': { description: 非 multipart 请求 }

  /quality/meeting-note-sources/progress:
    get:
      summary: 运行中的采集作业
      responses:
        '200':
          description: 作业列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobs:
                    type: array
                    items: { $ref: '#/components/schemas/MeetingNoteImport' }

  /quality/meeting-note-sources/history:
    get:
      summary: 历史采集记录
      parameters:
        - name: sourceId
          in: query
          schema: { type: string, format: uuid }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
      responses:
        '200':
          description: 按 started_at DESC
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/MeetingNoteImport' }

components:
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        services:
          type: object
          properties:
            database:
              type: string
            claude_api:
              type: string

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        code:
          type: string

    Topic:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        source:
          type: string
          enum: [hot, feedback, history, manual]
        confidence:
          type: number
        created_at:
          type: string
          format: date-time

    TopicInput:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
      required:
        - title

    ResearchResult:
      type: object
      properties:
        topic_id:
          type: string
        summary:
          type: string
        related_reports:
          type: array
          items:
            $ref: '#/components/schemas/Report'
        external_data:
          type: object

    Outline:
      type: object
      properties:
        topic_id:
          type: string
        sections:
          type: array
          items:
            type: object
            properties:
              title:
                type: string
              key_points:
                type: array
                items:
                  type: string

    Content:
      type: object
      properties:
        id:
          type: string
        topic_id:
          type: string
        title:
          type: string
        body:
          type: string
        model:
          type: string
        status:
          type: string
          enum: [draft, reviewing, approved, published]
        created_at:
          type: string
          format: date-time

    ReviewResult:
      type: object
      properties:
        content_id:
          type: string
        passed:
          type: boolean
        score:
          type: number
        feedback:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                enum: [suggestion, issue, praise]
              message:
                type: string

    PublishResult:
      type: object
      properties:
        content_id:
          type: string
        published_urls:
          type: object
          additionalProperties:
            type: string

    Report:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        date:
          type: string
          format: date
        relevance_score:
          type: number
        excerpt:
          type: string

    # ─────────── v7.6 会议纪要采集渠道 schema ────────────────────
    MeetingNoteSourceKind:
      type: string
      enum: [lark, zoom, teams, upload, folder, manual]
      description: |
        v1 真实实现: upload / folder / manual；lark / zoom / teams 是 stub
        (幂等返回空草稿，接线后再启用)。

    MeetingKind:
      type: string
      enum: [strategy_roadshow, tech_review, expert_interview, industry_research, internal_ops]
      description: |
        会议性质分类，由 meetingClassifier 按 (title, content) 启发式得出，
        存储在 asset.metadata.meeting_kind，供下游 deepAnalysisOrchestrator
        通过 meetingKindStrategyMap 选择专家策略。
        internal_ops 会被明确跳过专家分析。

    MeetingNoteSource:
      type: object
      required: [id, name, kind, config, isActive, createdAt, updatedAt]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        kind: { $ref: '#/components/schemas/MeetingNoteSourceKind' }
        config:
          type: object
          additionalProperties: true
          description: 按 kind 异构：folder→path、lark→space_id、upload→空对象等
        isActive: { type: boolean }
        scheduleCron:
          type: string
          nullable: true
          description: 标准 5 字段 cron 表达式；由 meetingNoteScheduler 调度
        lastImportedAt: { type: string, format: date-time, nullable: true }
        createdBy: { type: string, format: uuid, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    MeetingNoteSourceCreate:
      type: object
      required: [name, kind]
      properties:
        name: { type: string }
        kind: { $ref: '#/components/schemas/MeetingNoteSourceKind' }
        config:
          type: object
          additionalProperties: true
        isActive: { type: boolean, default: true }
        scheduleCron: { type: string, nullable: true }

    MeetingNoteSourceUpdate:
      type: object
      properties:
        name: { type: string }
        config:
          type: object
          additionalProperties: true
        isActive: { type: boolean }
        scheduleCron: { type: string, nullable: true }

    MeetingNoteImport:
      type: object
      required: [id, sourceId, status, startedAt, itemsDiscovered, itemsImported, duplicates, errors, assetIds, triggeredBy]
      properties:
        id: { type: string, format: uuid }
        sourceId: { type: string, format: uuid }
        status:
          type: string
          enum: [pending, running, succeeded, failed, partial]
        startedAt: { type: string, format: date-time }
        finishedAt: { type: string, format: date-time, nullable: true }
        itemsDiscovered: { type: integer, minimum: 0 }
        itemsImported: { type: integer, minimum: 0 }
        duplicates: { type: integer, minimum: 0 }
        errors: { type: integer, minimum: 0 }
        errorMessage: { type: string, nullable: true }
        assetIds:
          type: array
          items: { type: string, format: uuid }
          description: 本次导入新增的 asset.id 列表，反向索引用
        triggeredBy:
          type: string
          enum: [manual, scheduled, upload]
