<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>行业研究知识图谱</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            overflow: hidden;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #fff;
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .header .stats {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
        }

        #graph-container {
            width: 100vw;
            height: 100vh;
            cursor: grab;
        }

        #graph-container:active {
            cursor: grabbing;
        }

        .node circle {
            stroke: #fff;
            stroke-width: 2px;
            transition: all 0.3s ease;
        }

        .node:hover circle {
            stroke-width: 4px;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.5));
        }

        .node text {
            font-size: 12px;
            fill: #fff;
            text-anchor: middle;
            dominant-baseline: middle;
            pointer-events: none;
            font-weight: 500;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
        }

        .link {
            stroke: rgba(255, 255, 255, 0.3);
            stroke-width: 1.5px;
            transition: all 0.3s ease;
        }

        .link:hover {
            stroke: rgba(255, 255, 255, 0.6);
            stroke-width: 2.5px;
        }

        .tooltip {
            position: absolute;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.9);
            color: #fff;
            border-radius: 8px;
            font-size: 13px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            max-width: 250px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tooltip h4 {
            margin-bottom: 8px;
            color: #64b5f6;
            font-size: 14px;
        }

        .tooltip p {
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.5;
        }

        .controls {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 100;
        }

        .controls button {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .controls button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        .legend {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 12px;
            color: #fff;
            z-index: 100;
        }

        .legend h3 {
            font-size: 14px;
            margin-bottom: 12px;
            opacity: 0.9;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 8px 0;
            font-size: 13px;
        }

        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .search-box {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 101;
        }

        .search-box input {
            width: 300px;
            padding: 12px 20px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }

        .search-box input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .search-box input:focus {
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 20px rgba(100, 181, 246, 0.3);
        }

        .panel {
            position: fixed;
            right: -400px;
            top: 0;
            width: 400px;
            height: 100vh;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            padding: 80px 30px 30px;
            transition: right 0.3s ease;
            z-index: 99;
            overflow-y: auto;
        }

        .panel.active {
            right: 0;
        }

        .panel h2 {
            color: #fff;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .panel .info-item {
            margin: 20px 0;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .panel .info-item h4 {
            color: #64b5f6;
            font-size: 13px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .panel .info-item p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 15px;
            line-height: 1.6;
        }

        .close-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: #fff;
            font-size: 28px;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.3s;
        }

        .close-panel:hover {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏢 行业研究知识图谱</h1>
        <div class="stats">
            <span id="node-count">0</span> 个节点 |
            <span id="link-count">0</span> 个关系
        </div>
    </div>

    <div class="search-box">
        <input type="text" id="search-input" placeholder="🔍 搜索节点...">
    </div>

    <div id="graph-container"></div>

    <div class="tooltip" id="tooltip"></div>

    <div class="legend">
        <h3>层级分类</h3>
        <div class="legend-item">
            <div class="legend-dot" style="background: #ff6b6b;"></div>
            <span>根节点</span>
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="background: #4ecdc4;"></div>
            <span>一级分类</span>
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="background: #45b7d1;"></div>
            <span>二级分类</span>
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="background: #96ceb4;"></div>
            <span>三级分类</span>
        </div>
    </div>

    <div class="controls">
        <button onclick="zoomIn()" title="放大">+</button>
        <button onclick="zoomOut()" title="缩小">−</button>
        <button onclick="resetZoom()" title="重置">⟲</button>
        <button onclick="togglePhysics()" title="切换物理模拟">⏸</button>
    </div>

    <div class="panel" id="panel">
        <button class="close-panel" onclick="closePanel()">×</button>
        <h2 id="panel-title">节点详情</h2>
        <div id="panel-content"></div>
    </div>

    <script>
        // 知识图谱数据
        const graphData = {
            nodes: [
                // 根节点
                { id: "root", name: "行业研究", level: 0, description: "行业研究知识库根节点" },

                // 一级分类 - 主要行业
                { id: "freight", name: "货运", level: 1, description: "物流运输行业研究" },
                { id: "pharma", name: "医药业", level: 1, description: "医药行业研究 (2018)" },
                { id: "ecommerce", name: "电商", level: 1, description: "电子商务行业研究" },
                { id: "realestate", name: "房地产", level: 1, description: "房地产行业研究" },
                { id: "payment", name: "支付", level: 1, description: "支付行业研究" },
                { id: "hotel", name: "酒店", level: 1, description: "酒店行业研究" },
                { id: "auto", name: "汽车行业", level: 1, description: "汽车行业研究" },
                { id: "fintech", name: "金融科技", level: 1, description: "金融科技与数字货币" },
                { id: "homeservice", name: "家庭服务", level: 1, description: "家庭服务行业研究" },
                { id: "localife", name: "本地生活", level: 1, description: "本地生活服务研究" },
                { id: "flexwork", name: "灵活用工", level: 1, description: "灵活用工行业研究" },
                { id: "longrent", name: "长租公寓", level: 1, description: "长租公寓行业研究" },
                { id: "membership", name: "会员制", level: 1, description: "会员制商业模式研究" },
                { id: "econtract", name: "电子合同", level: 1, description: "电子合同行业研究" },
                { id: "building", name: "家居建材", level: 1, description: "家居建材行业研究" },
                { id: "travel", name: "企业差旅费控", level: 1, description: "企业差旅与费用控制" },
                { id: "publishing", name: "出版", level: 1, description: "出版行业研究" },
                { id: "invest", name: "投融资", level: 1, description: "投融资行业研究" },

                // BK研究院子分类
                { id: "bk_agent", name: "经纪人", level: 2, parent: "BK研究院", description: "经纪人研究" },
                { id: "bk_consumer", name: "居民及消费", level: 2, parent: "BK研究院", description: "居民消费研究" },
                { id: "bk_platform", name: "平台", level: 2, parent: "BK研究院", description: "平台经济研究" },
                { id: "bk_rental", name: "租赁市场", level: 2, parent: "BK研究院", description: "租赁市场研究" },

                // 租赁市场子分类
                { id: "rental_special", name: "专题报告", level: 3, description: "租赁市场专题报告" },
                { id: "rental_periodic", name: "周期报告", level: 3, description: "租赁市场周期报告" },

                // McK 子分类
                { id: "mck_repair", name: "维修", level: 2, parent: "McK", description: "家庭维修服务" },
                { id: "mck_housekeeping", name: "家政", level: 2, parent: "McK", description: "家政服务" },
                { id: "mck_laundry", name: "洗衣", level: 2, parent: "McK", description: "洗衣服务" },
                { id: "mck_pet", name: "宠物", level: 2, parent: "McK", description: "宠物服务" },

                // 金融业务子分类
                { id: "finance_strategy", name: "财经策略", level: 2, description: "财经策略研究" },
                { id: "securities", name: "证券", level: 3, description: "证券行业研究" },
                { id: "insurance", name: "保险", level: 3, description: "保险行业研究" },
                { id: "consumer_finance", name: "消费金融", level: 3, description: "消费金融行业" },
                { id: "wealth_mgmt", name: "理财", level: 3, description: "理财服务研究" },
                { id: "fintech_general", name: "金融科技综合", level: 3, description: "金融科技综合研究" },

                // 本地生活子分类
                { id: "hotel_tourism", name: "酒店旅游", level: 2, description: "酒店与旅游服务" },

                // 家庭服务子分类
                { id: "homeservice_freight", name: "货运", level: 2, description: "家庭货运服务" },
                { id: "care_us", name: "美国家政服务", level: 2, description: "Care IPO 研究" }
            ],
            links: [
                // 根节点连接
                { source: "root", target: "freight" },
                { source: "root", target: "pharma" },
                { source: "root", target: "ecommerce" },
                { source: "root", target: "realestate" },
                { source: "root", target: "payment" },
                { source: "root", target: "hotel" },
                { source: "root", target: "auto" },
                { source: "root", target: "fintech" },
                { source: "root", target: "homeservice" },
                { source: "root", target: "localife" },
                { source: "root", target: "flexwork" },
                { source: "root", target: "longrent" },
                { source: "root", target: "membership" },
                { source: "root", target: "econtract" },
                { source: "root", target: "building" },
                { source: "root", target: "travel" },
                { source: "root", target: "publishing" },
                { source: "root", target: "invest" },
                { source: "root", target: "bk_agent" },
                { source: "root", target: "bk_consumer" },
                { source: "root", target: "bk_platform" },
                { source: "root", target: "bk_rental" },
                { source: "root", target: "mck_repair" },
                { source: "root", target: "mck_housekeeping" },
                { source: "root", target: "mck_laundry" },
                { source: "root", target: "mck_pet" },

                // 租赁市场子分类
                { source: "bk_rental", target: "rental_special" },
                { source: "bk_rental", target: "rental_periodic" },

                // 金融业务子分类
                { source: "fintech", target: "finance_strategy" },
                { source: "finance_strategy", target: "securities" },
                { source: "finance_strategy", target: "insurance" },
                { source: "finance_strategy", target: "consumer_finance" },
                { source: "finance_strategy", target: "wealth_mgmt" },
                { source: "finance_strategy", target: "fintech_general" },

                // 本地生活子分类
                { source: "localife", target: "hotel_tourism" },

                // 家庭服务子分类
                { source: "homeservice", target: "homeservice_freight" },
                { source: "homeservice", target: "care_us" },

                // 关联关系
                { source: "payment", target: "fintech" },
                { source: "ecommerce", target: "payment" },
                { source: "hotel", target: "localife" },
                { source: "longrent", target: "realestate" },
                { source: "longrent", target: "bk_rental" },
                { source: "homeservice", target: "mck_housekeeping" }
            ]
        };

        // 颜色配置
        const colors = {
            0: "#ff6b6b",  // 根节点 - 红色
            1: "#4ecdc4",  // 一级 - 青色
            2: "#45b7d1",  // 二级 - 蓝色
            3: "#96ceb4"   // 三级 - 绿色
        };

        const radius = {
            0: 40,
            1: 25,
            2: 18,
            3: 12
        };

        // 初始化 D3
        const width = window.innerWidth;
        const height = window.innerHeight;

        const svg = d3.select("#graph-container")
            .append("svg")
            .attr("width", width)
            .attr("height", height);

        // 添加缩放行为
        const g = svg.append("g");

        const zoom = d3.zoom()
            .scaleExtent([0.1, 4])
            .on("zoom", (event) => {
                g.attr("transform", event.transform);
            });

        svg.call(zoom);

        // 物理模拟
        let simulation = d3.forceSimulation(graphData.nodes)
            .force("link", d3.forceLink(graphData.links).id(d => d.id).distance(d => {
                return d.source.level === 0 ? 150 : 80;
            }))
            .force("charge", d3.forceManyBody().strength(d => {
                return d.level === 0 ? -1000 : -300;
            }))
            .force("center", d3.forceCenter(width / 2, height / 2))
            .force("collision", d3.forceCollide().radius(d => radius[d.level] + 20));

        // 绘制连线
        const link = g.append("g")
            .selectAll("line")
            .data(graphData.links)
            .enter()
            .append("line")
            .attr("class", "link");

        // 绘制节点组
        const node = g.append("g")
            .selectAll("g")
            .data(graphData.nodes)
            .enter()
            .append("g")
            .attr("class", "node")
            .call(d3.drag()
                .on("start", dragstarted)
                .on("drag", dragged)
                .on("end", dragended));

        // 节点圆形
        node.append("circle")
            .attr("r", d => radius[d.level])
            .attr("fill", d => colors[d.level])
            .attr("fill-opacity", 0.9);

        // 节点文字
        node.append("text")
            .text(d => d.name)
            .attr("dy", d => radius[d.level] + 15)
            .style("font-size", d => d.level === 0 ? "16px" : (d.level === 1 ? "13px" : "11px"));

        // 工具提示
        const tooltip = d3.select("#tooltip");

        node.on("mouseover", function(event, d) {
            tooltip.style("opacity", 1)
                .html(`<h4>${d.name}</h4><p>${d.description}</p>`)
                .style("left", (event.pageX + 15) + "px")
                .style("top", (event.pageY - 10) + "px");
        })
        .on("mouseout", function() {
            tooltip.style("opacity", 0);
        })
        .on("click", function(event, d) {
            showPanel(d);
        });

        // 更新位置
        simulation.on("tick", () => {
            link
                .attr("x1", d => d.source.x)
                .attr("y1", d => d.source.y)
                .attr("x2", d => d.target.x)
                .attr("y2", d => d.target.y);

            node.attr("transform", d => `translate(${d.x},${d.y})`);
        });

        // 拖拽函数
        function dragstarted(event, d) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x;
            d.fy = d.y;
        }

        function dragged(event, d) {
            d.fx = event.x;
            d.fy = event.y;
        }

        function dragended(event, d) {
            if (!event.active) simulation.alphaTarget(0);
            d.fx = null;
            d.fy = null;
        }

        // 控制功能
        function zoomIn() {
            svg.transition().call(zoom.scaleBy, 1.3);
        }

        function zoomOut() {
            svg.transition().call(zoom.scaleBy, 0.7);
        }

        function resetZoom() {
            svg.transition().call(zoom.transform, d3.zoomIdentity);
        }

        let physicsEnabled = true;
        function togglePhysics() {
            physicsEnabled = !physicsEnabled;
            if (physicsEnabled) {
                simulation.restart();
            } else {
                simulation.stop();
            }
        }

        // 搜索功能
        const searchInput = document.getElementById("search-input");
        searchInput.addEventListener("input", function(e) {
            const term = e.target.value.toLowerCase();

            node.selectAll("circle")
                .attr("opacity", d => {
                    if (!term) return 0.9;
                    return d.name.toLowerCase().includes(term) ? 1 : 0.2;
                })
                .attr("stroke-width", d => {
                    if (!term) return 2;
                    return d.name.toLowerCase().includes(term) ? 4 : 2;
                });

            link.attr("opacity", term ? 0.1 : 1);
        });

        // 面板功能
        function showPanel(d) {
            const panel = document.getElementById("panel");
            const title = document.getElementById("panel-title");
            const content = document.getElementById("panel-content");

            title.textContent = d.name;
            content.innerHTML = `
                <div class="info-item">
                    <h4>描述</h4>
                    <p>${d.description}</p>
                </div>
                <div class="info-item">
                    <h4>层级</h4>
                    <p>Level ${d.level} - ${d.level === 0 ? '根节点' : d.level === 1 ? '一级分类' : d.level === 2 ? '二级分类' : '三级分类'}</p>
                </div>
                <div class="info-item">
                    <h4>ID</h4>
                    <p>${d.id}</p>
                </div>
                ${d.parent ? `
                <div class="info-item">
                    <h4>所属</h4>
                    <p>${d.parent}</p>
                </div>
                ` : ''}
            `;

            panel.classList.add("active");
        }

        function closePanel() {
            document.getElementById("panel").classList.remove("active");
        }

        // 更新统计
        document.getElementById("node-count").textContent = graphData.nodes.length;
        document.getElementById("link-count").textContent = graphData.links.length;

        // 窗口大小调整
        window.addEventListener("resize", () => {
            const newWidth = window.innerWidth;
            const newHeight = window.innerHeight;

            svg.attr("width", newWidth).attr("height", newHeight);
            simulation.force("center", d3.forceCenter(newWidth / 2, newHeight / 2));
            simulation.alpha(0.3).restart();
        });
    </script>
</body>
</html>
